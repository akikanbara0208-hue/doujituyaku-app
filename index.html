<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同時通訳アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f0efeb;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.app{max-width:640px;margin:0 auto}
h1{font-size:22px;font-weight:500;text-align:center;margin-bottom:4px}
.hero-sub{font-size:13px;color:#888;text-align:center;margin-bottom:1.5rem}
.badge{font-size:11px;font-weight:600;background:#e8f7f1;color:#1a7a55;border:1px solid #b8e8d4;border-radius:20px;padding:3px 12px;display:block;text-align:center;width:fit-content;margin:0 auto 1.5rem}
.card{background:#fff;border:1px solid #e0ddd8;border-radius:14px;padding:16px;margin-bottom:12px}
.card-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.vf{margin-bottom:10px}
.vf label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.vf:last-child{margin-bottom:0}
.key-row{display:flex;align-items:center;gap:6px}
.key-row input{flex:1;font-size:12px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#f9f8f5;font-family:monospace;color:#1a1a1a}
.show-btn{font-size:11px;color:#888;background:none;border:1px solid #ddd;border-radius:6px;padding:6px 8px;cursor:pointer;white-space:nowrap}
.show-btn:hover{background:#f0ede8}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#f9f8f5;color:#1a1a1a}
input[type=range]{width:100%;margin-top:6px}
.rv{margin-left:4px;font-weight:400;color:#999}
.file-area{border:1px dashed #ccc;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:background .15s;margin-bottom:10px}
.file-area:hover{background:#f9f8f5}
.file-area input{display:none}
.file-area .icon{font-size:30px;margin-bottom:8px}
.file-area p{font-size:13px;color:#888}
.file-name{font-size:12px;color:#bbb;margin-top:4px}
.err-box{font-size:12px;color:#a00;background:#fde8e8;border:1px solid #f5b8b8;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:none}
.big-btn{width:100%;height:50px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.big-btn:hover{background:#f5f4f0}
.big-btn.running{background:#e8f7f1;border-color:#2da87a;color:#1a7a55}
.big-btn:disabled{opacity:.4;cursor:not-allowed}
.stop-btn{background:#fde8e8;border-color:#e24b4a;color:#a00}
.stop-btn:hover{background:#fcd0d0}
.dot{width:8px;height:8px;border-radius:50%;background:#2da87a;flex-shrink:0;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.prog-wrap{margin-bottom:12px;display:none}
.prog-bar{height:4px;background:#e8e4dc;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#2da87a;border-radius:2px;transition:width .4s}
.prog-lbl{font-size:11px;color:#aaa;margin-top:4px;text-align:center}
.sub-wrap{margin-bottom:12px}
.sub-box{background:#fff;border:1px solid #e0ddd8;border-radius:14px;padding:22px 24px;min-height:110px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:8px}
.sub-orig{font-size:13px;color:#bbb;line-height:1.6;width:100%;min-height:20px}
.sub-tl{font-size:22px;font-weight:500;color:#1a1a1a;line-height:1.55;width:100%;min-height:34px}
.sub-tl.empty{font-size:14px;font-weight:400;color:#ccc}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-top span{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em}
.clr{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer}
.clr:hover{color:#888}
.log-body{max-height:220px;overflow-y:auto}
.log-item{padding:10px 0;border-bottom:1px solid #f0ede8}
.log-item:last-child{border-bottom:none}
.log-en{font-size:12px;color:#bbb;line-height:1.5}
.log-ja{font-size:14px;color:#1a1a1a;line-height:1.6;margin-top:2px}
.log-empty{font-size:13px;color:#ccc;text-align:center;padding:20px 0}
.status-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.sdot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.sdot.on{background:#2da87a;animation:pulse 1.2s infinite}
.sdot.err{background:#e24b4a}
.stxt{font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="app">
  <h1>🎙 同時通訳</h1>
  <p class="hero-sub">音声ファイルを日本語に翻訳・読み上げします</p>

  <div class="card">
    <div class="card-label">APIキー設定</div>
    <div class="vf">
      <label>OpenAI APIキー（Whisper 文字起こし用）</label>
      <div class="key-row">
        <input type="password" id="openaiKey" placeholder="sk-...">
        <button class="show-btn" onclick="toggleVis('openaiKey',this)">表示</button>
      </div>
    </div>
    <div class="vf">
      <label>Anthropic APIキー（Claude 翻訳用）</label>
      <div class="key-row">
        <input type="password" id="claudeKey" placeholder="sk-ant-...">
        <button class="show-btn" onclick="toggleVis('claudeKey',this)">表示</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">読み上げ設定</div>
    <div class="row2">
      <div class="vf" style="margin-bottom:0">
        <label>声の種類</label>
        <select id="voiceSel"></select>
      </div>
      <div class="vf" style="margin-bottom:0">
        <label>速度<span class="rv" id="rv">0.85×</span></label>
        <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.85"
          oninput="document.getElementById('rv').textContent=parseFloat(this.value).toFixed(2)+'×'">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">音声ファイル</div>
    <div class="file-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="audio/*" onchange="onFileChange(event)">
      <div class="icon">🎵</div>
      <p>クリックして音声ファイルを選択</p>
      <p class="file-name" id="fileName">MP3 / M4A / WAV など</p>
    </div>
    <div class="err-box" id="errBox"></div>
    <div style="display:flex;gap:8px">
      <button class="big-btn" id="startBtn" onclick="startTranslation()" disabled>
        <span>▶️</span><span id="btnLabel">通訳開始</span>
        <span class="dot" id="btnDot" style="display:none"></span>
      </button>
      <button class="big-btn stop-btn" id="stopBtn" onclick="stopTranslation()" style="display:none;width:auto;padding:0 20px">
        ⏹ 停止
      </button>
    </div>
  </div>

  <div class="prog-wrap" id="progWrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-lbl" id="progLbl">処理中...</div>
  </div>

  <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">字幕</div>
  <div class="sub-wrap">
    <div class="sub-box">
      <div class="sub-orig" id="subOrig"></div>
      <div class="sub-tl empty" id="subTl">通訳が始まるとここに表示されます</div>
    </div>
  </div>

  <div class="card">
    <div class="log-top">
      <span>通訳ログ</span>
      <button class="clr" onclick="clearLog()">クリア</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty" id="logEmpty">まだ通訳がありません</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span class="stxt" id="stxt">APIキーを入力して音声ファイルを選択してください</span>
  </div>
</div>

<script>
const CHUNK_SEC = 30;
const ONENESS_SYSTEM = `あなたはONENESSムーブメントの専門通訳者です。以下のルールに従って翻訳してください。

【翻訳ルール】
- 英語のみ日本語に翻訳する
- 日本語はそのまま日本語で出力する
- 韓国語は無視してスキップする（何も出力しない）
- 翻訳は穏やかで自然な口調にする
- 翻訳文のみを返す（説明不要）
- 笑い声・拍手等の非言語音声は無視する

【ONENESS専門用語の翻訳】
Deeksha / Oneness Blessing → ディークシャ
Awakening → 覚醒
Enlightenment → 悟り・解脱
Oneness → ワンネス
The Divine → 神聖なるもの
Liberation / Mukti → 解放・ムクティ
Golden City → ゴールデンシティ
Sri Amma / Sri Bhagavan → シュリ・アンマ / シュリ・バガヴァン
Consciousness → 意識
Grace → 恩寵
Surrender → 委ねる
Presence → プレゼンス
Sacred Chamber → 聖なる部屋
Process → プロセス
Initiation → イニシエーション

入力テキスト：`;

let voices = [], audioFile = null, shouldStop = false, isRunning = false;

window.addEventListener('load', () => {
  const ok = localStorage.getItem('openai_key');
  const ck = localStorage.getItem('claude_key');
  if (ok) document.getElementById('openaiKey').value = ok;
  if (ck) document.getElementById('claudeKey').value = ck;
});
document.addEventListener('input', e => {
  if (e.target.id === 'openaiKey') localStorage.setItem('openai_key', e.target.value);
  if (e.target.id === 'claudeKey') localStorage.setItem('claude_key', e.target.value);
});

function toggleVis(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '表示' : '隠す';
}

function setStatus(cls, msg) {
  document.getElementById('stxt').textContent = msg;
  document.getElementById('sdot').className = 'sdot' + (cls ? ' '+cls : '');
}

function showErr(msg) {
  const b = document.getElementById('errBox');
  b.textContent = msg;
  b.style.display = msg ? 'block' : 'none';
}

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const vs = document.getElementById('voiceSel');
  vs.innerHTML = '';
  const filtered = voices.filter(v => v.lang.startsWith('ja'));
  (filtered.length ? filtered : voices.slice(0,8)).forEach(v => {
    const o = document.createElement('option');
    o.value = voices.indexOf(v);
    o.textContent = v.name.replace(/\(.*\)/,'').trim();
    vs.appendChild(o);
  });
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  return new Promise(resolve => {
    if (shouldStop || !text.trim()) { resolve(); return; }
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const vs = document.getElementById('voiceSel');
    const idx = parseInt(vs.options[vs.selectedIndex]?.value ?? 0);
    if (voices[idx]) utt.voice = voices[idx];
    utt.rate = parseFloat(document.getElementById('rateSlider').value);
    utt.pitch = 0.92;
    utt.onend = utt.onerror = () => resolve();
    speechSynthesis.speak(utt);
  });
}

function onFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  audioFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('startBtn').disabled = false;
  showErr('');
}

async function whisperTranscribe(blob, openaiKey) {
  const form = new FormData();
  form.append('file', blob, 'chunk.wav');
  form.append('model', 'whisper-1');
  form.append('response_format', 'verbose_json');
  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + openaiKey },
    body: form
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.text || '';
}

async function claudeTranslate(text, claudeKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': claudeKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: ONENESS_SYSTEM + text }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text?.trim() || '';
}

function audioBufferToWav(buffer) {
  const sr = buffer.sampleRate;
  const samples = buffer.getChannelData(0);
  const len = samples.length;
  const ab = new ArrayBuffer(44 + len * 2);
  const v = new DataView(ab);
  const ws = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+len*2,true); ws(8,'WAVE');
  ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,len*2,true);
  let off=44;
  for(let i=0;i<len;i++){
    const s=Math.max(-1,Math.min(1,samples[i]));
    v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true); off+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}

function addLog(en, ja) {
  document.getElementById('logEmpty')?.remove();
  const body = document.getElementById('logBody');
  const d = document.createElement('div');
  d.className = 'log-item';
  d.innerHTML = `<div class="log-en">${esc(en)}</div><div class="log-ja">${esc(ja)}</div>`;
  body.prepend(d);
}
function clearLog() {
  document.getElementById('logBody').innerHTML = '<div class="log-empty" id="logEmpty">まだ通訳がありません</div>';
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function startTranslation() {
  const openaiKey = document.getElementById('openaiKey').value.trim();
  const claudeKey = document.getElementById('claudeKey').value.trim();
  if (!openaiKey) { showErr('OpenAI APIキーを入力してください'); return; }
  if (!claudeKey) { showErr('Anthropic APIキーを入力してください'); return; }
  if (!audioFile) { showErr('音声ファイルを選択してください'); return; }
  showErr('');
  shouldStop = false;
  isRunning = true;

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'flex';
  document.getElementById('progWrap').style.display = 'block';
  setStatus('on', '音声ファイルを読み込み中...');

  try {
    const arrayBuf = await audioFile.arrayBuffer();
    const audioCtx = new AudioContext();
    const decoded = await audioCtx.decodeAudioData(arrayBuf);
    const duration = decoded.duration;
    const sr = decoded.sampleRate;
    const totalChunks = Math.ceil(duration / CHUNK_SEC);

    for (let i = 0; i < totalChunks; i++) {
      if (shouldStop) break;

      const pct = Math.round((i / totalChunks) * 100);
      document.getElementById('progFill').style.width = pct + '%';
      document.getElementById('progLbl').textContent = `${i+1} / ${totalChunks} チャンク (${Math.round((i*CHUNK_SEC)/60)}分${(i*CHUNK_SEC)%60}秒〜)`;

      const startSample = i * CHUNK_SEC * sr;
      const endSample = Math.min((i+1) * CHUNK_SEC * sr, decoded.length);
      const chunkLen = endSample - startSample;

      const offCtx = new OfflineAudioContext(1, chunkLen, sr);
      const src = offCtx.createBufferSource();
      const chunkBuf = new AudioBuffer({numberOfChannels:1, length:chunkLen, sampleRate:sr});
      chunkBuf.copyToChannel(decoded.getChannelData(0).slice(startSample, endSample), 0);
      src.buffer = chunkBuf;
      src.connect(offCtx.destination);
      src.start();
      const rendered = await offCtx.startRendering();
      const wavBlob = audioBufferToWav(rendered);

      setStatus('on', `文字起こし中... (${i+1}/${totalChunks})`);
      document.getElementById('subOrig').textContent = '文字起こし中...';
      document.getElementById('subTl').textContent = '翻訳待ち...';
      document.getElementById('subTl').className = 'sub-tl empty';

      let transcript;
      try {
        transcript = await whisperTranscribe(wavBlob, openaiKey);
      } catch(e) {
        showErr('Whisperエラー: ' + e.message);
        break;
      }

      if (!transcript.trim() || shouldStop) continue;

      setStatus('on', `翻訳中... (${i+1}/${totalChunks})`);
      let translated;
      try {
        translated = await claudeTranslate(transcript, claudeKey);
      } catch(e) {
        showErr('Claude翻訳エラー: ' + e.message);
        break;
      }

      if (!translated || shouldStop) continue;

      document.getElementById('subOrig').textContent = transcript;
      const subTl = document.getElementById('subTl');
      subTl.textContent = translated;
      subTl.className = 'sub-tl';
      addLog(transcript, translated);

      setStatus('on', `読み上げ中... (${i+1}/${totalChunks})`);
      await speak(translated);
    }

    if (!shouldStop) {
      document.getElementById('progFill').style.width = '100%';
      document.getElementById('progLbl').textContent = '通訳完了！';
      setStatus('', '完了しました');
    } else {
      setStatus('', '停止しました');
    }
  } catch(e) {
    showErr('エラー: ' + e.message);
    setStatus('err', 'エラーが発生しました');
  }

  isRunning = false;
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
}

function stopTranslation() {
  shouldStop = true;
  speechSynthesis.cancel();
  isRunning = false;
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
  setStatus('', '停止しました');
  document.getElementById('progLbl').textContent = '停止しました';
}
</script>
</body>
</html>
